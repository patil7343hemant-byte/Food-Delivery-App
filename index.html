<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Delivery App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">UCT Internship Project</p>
      <h1>Food Delivery App</h1>
      <p class="sub">Browse restaurants, add items to cart, place an order, and track status.</p>
    </div>
    <div class="health" id="health">API status: checking...</div>
  </header>

  <main class="layout">
    <section class="panel hero">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search restaurants or cuisine..." />
        <button id="clearBtn">Clear</button>
      </div>
      <div id="restaurantList" class="cards"></div>
    </section>

    <aside class="panel cart">
      <h2>Cart</h2>
      <div id="selectedRestaurant" class="muted">No restaurant selected</div>
      <div id="cartItems" class="cart-items"></div>
      <div class="totals">
        <span>Total</span>
        <strong id="cartTotal">₹0</strong>
      </div>

      <h3>Checkout</h3>
      <form id="checkoutForm" class="checkout">
        <input name="customerName" placeholder="Your name" required />
        <input name="phone" placeholder="Phone number" required />
        <textarea name="address" placeholder="Delivery address" required></textarea>
        <select name="paymentMethod">
          <option>Online</option>
          <option>Cash on Delivery</option>
        </select>
        <button type="submit">Place Order</button>
      </form>

      <div id="orderResult" class="order-result"></div>
      <div id="trackingBox" class="tracking hidden"></div>
    </aside>
  </main>

  <section class="panel menu-panel">
    <div class="menu-header">
      <div>
        <h2 id="menuTitle">Restaurant Menu</h2>
        <p id="menuSubtitle" class="muted">Select a restaurant to view items.</p>
      </div>
      <button id="refreshOrdersBtn" class="secondary">Refresh Orders</button>
    </div>
    <div id="menuList" class="menu-grid"></div>
  </section>

  <section class="panel admin-panel">
    <h2>Recent Orders</h2>
    <div id="ordersList" class="orders"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
